name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Unit tests (React hooks + components) ───────────────────────────────
  unit-tests:
    name: Unit Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: packages/react/package-lock.json

      - name: Install React package dependencies
        working-directory: packages/react
        run: npm install

      - name: Run unit tests
        working-directory: packages/react
        run: npm test -- --run

      - name: Run unit tests with coverage + enforce thresholds
        if: matrix.node-version == 20
        working-directory: packages/react
        run: npm test -- --run --coverage --coverage.thresholds.lines=75 --coverage.thresholds.functions=70 --coverage.thresholds.branches=65

      - name: Upload coverage
        if: matrix.node-version == 20
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage-report
          path: packages/react/coverage/
          retention-days: 30

  # ── 2. Security ────────────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: packages/react
        run: npm install

      - name: Dependency audit (hard failure — no || true)
        working-directory: packages/react
        run: npm audit --audit-level=high

      - name: License compliance check
        working-directory: packages/react
        run: npx --yes license-checker --onlyAllow 'MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;CC0-1.0;0BSD;Unlicense;Python-2.0'

  # ── 3. E2E tests (runs after unit tests pass) ──────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [unit-tests]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            demo/package-lock.json
            e2e/package-lock.json

      - name: Install demo dependencies
        working-directory: demo
        run: npm ci

      - name: Install E2E dependencies
        working-directory: e2e
        run: npm install

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: e2e
        run: npx playwright test --project=chromium
        env:
          CI: true

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14

      - name: Upload test videos on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-videos
          path: e2e/test-results/
          retention-days: 7
